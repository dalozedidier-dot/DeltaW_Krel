name: Extended tests & coverage

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly deep run to catch dependency drift (Monday 05:17 UTC).
    - cron: "17 5 * * 1"

jobs:
  coverage:
    name: pytest + coverage (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest-cov

      - name: Run full test suite with coverage gate
        run: >
          pytest tests
          --cov=src/deltawkrel
          --cov=scripts
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:coverage_html
          --cov-fail-under=90

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage_html/
          if-no-files-found: ignore

  reproducibility-pipeline:
    name: Full reproducibility pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Freeze preregistration config
        run: python scripts/freeze_preregistration.py

      - name: Run K_CS SDP validation suite
        run: python scripts/run_sdp_validation.py

      - name: Run micro-tomography stress test
        run: python scripts/micro_tomography_simulation.py --outdir results/micro_smoke --n-sim 200 --n-null 500

      - name: Run Monte Carlo control bench (with SDP proxy and witness stability)
        run: >
          python scripts/monte_carlo_control_supplement.py
          --n-sim 200 --n-null 500 --dim 9 --n-noise 2
          --lambda-values 0,0.005,0.01 --n-values 1000,5000
          --threshold-mode empirical
          --include-M0 --subsystem-dim 3
          --sdp-check --witness-stability
          --output-dir results/mc_smoke

      - name: Generate reproducibility report
        run: python scripts/generate_reproducibility_report.py

      - name: Validate manifest against tracked sources
        run: python scripts/validate_manifest.py

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-pipeline-outputs
          path: |
            results/
            results/micro_smoke/
            results/mc_smoke/
          if-no-files-found: ignore
