name: DeltaW/K_rel CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: pytest -q tests

      - name: Run micro-tomography smoke test
        run: python scripts/micro_tomography_simulation.py --outdir results/micro_smoke --n-sim 100 --n-null 200

      - name: Run realistic tomography bridge smoke test
        run: >
          python scripts/realistic_tomography_pipeline.py
          --outdir results/realistic_tomography_smoke
          --n-sim 10 --n-null 20 --n-boot 6
          --lambda-values 0,0.05 --n-total-values 800
          --visibility-values 0.95 --crosstalk-values 0,0.02 --drift-values 0,0.01

      - name: Run full tomography stress smoke test
        run: >
          python scripts/full_tomography_simulation.py
          --outdir results/full_tomography_smoke
          --n-sim 4 --n-null 8 --n-boot 3
          --lambda-values 0,0.05 --n-total-values 600
          --visibility-values 0.95 --dephasing-values 0.01
          --control-crosstalk-values 0.01 --operation-crosstalk-values 0.01
          --drift-values 0.005 --path-loss-values 0.02

      - name: Run Monte Carlo control smoke test
        run: python scripts/monte_carlo_control_supplement.py --n-sim 50 --n-null 100 --dim 4 --n-noise 1 --lambda-values 0,0.005 --n-values 200 --output-dir results/mc_smoke --no-plots

      - name: Upload generated smoke outputs
        uses: actions/upload-artifact@v4
        with:
          name: smoke-outputs
          path: |
            results/micro_smoke/
            results/realistic_tomography_smoke/
            results/full_tomography_smoke/
            results/mc_smoke/
          if-no-files-found: ignore
